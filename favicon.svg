<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="85%" r="55%">
      <stop offset="0%"   stop-color="#2a1400"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="amberLiq" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ff9200" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#d95f00" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#b33c00"/>
    </linearGradient>
    <linearGradient id="glassL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="25%"  stop-color="#ffe8c0" stop-opacity="0.15"/>
      <stop offset="75%"  stop-color="#ffe8c0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.30"/>
    </linearGradient>
    <radialGradient id="floorGlow" cx="50%" cy="100%" r="50%">
      <stop offset="0%"   stop-color="#d95f00" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="liqGlow" cx="40%" cy="55%" r="60%">
      <stop offset="0%"   stop-color="#ffb347" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b33c00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" fill="url(#bgGlow)"/>
  <ellipse cx="32" cy="62" rx="22" ry="7" fill="url(#floorGlow)"/>
  <!-- amber liquid -->
  <path d="M14,58 Q12,58 12,56 L22,35 L22,17 L42,17 L42,35 L52,56 Q52,58 50,58 Z" fill="url(#amberLiq)"/>
  <path d="M14,58 Q12,58 12,56 L22,35 L22,17 L42,17 L42,35 L52,56 Q52,58 50,58 Z" fill="url(#liqGlow)"/>
  <path d="M22,36 Q32,32 42,36" fill="none" stroke="#ffb347" stroke-width="1.2" opacity="0.75"/>
  <!-- flask outline -->
  <path d="M22,8 L22,36 L11,56 Q10,59 13,59 L51,59 Q54,59 53,56 L42,36 L42,8" fill="none" stroke="rgba(255,220,150,0.65)" stroke-width="1.4" stroke-linejoin="round"/>
  <path d="M22,8 L22,36 L11,56 Q10,59 13,59 L51,59 Q54,59 53,56 L42,36 L42,8" fill="url(#glassL)"/>
  <!-- highlights -->
  <path d="M22,9 L22,36 L12,55" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="22" y="6" width="20" height="31" fill="url(#glassL)"/>
  <line x1="24" y1="6" x2="24" y2="36" stroke="rgba(255,255,255,0.55)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- graduation marks -->
  <line x1="22" y1="44" x2="27" y2="44" stroke="rgba(255,255,255,0.45)" stroke-width="0.9"/>
  <line x1="22" y1="50" x2="27" y2="50" stroke="rgba(255,255,255,0.45)" stroke-width="0.9"/>
  <!-- mouth rim -->
  <ellipse cx="32" cy="6" rx="10" ry="2.5" fill="none" stroke="rgba(255,220,150,0.6)" stroke-width="1.4"/>
  <ellipse cx="32" cy="6" rx="8" ry="1.8" fill="rgba(255,255,255,0.1)"/>
  <ellipse cx="26" cy="52" rx="2.5" ry="1.5" fill="rgba(255,200,100,0.22)"/>
</svg>
